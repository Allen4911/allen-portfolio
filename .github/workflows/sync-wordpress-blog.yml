name: Sync WordPress Blog Content

on:
  repository_dispatch:
    types: [wordpress-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout allen-portfolio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Checkout wordpress-blog
        uses: actions/checkout@v4
        with:
          repository: Allen4911/wordpress-blog
          token: ${{ secrets.SYNC_TOKEN }}
          path: wordpress-source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        run: node scripts/sync-wordpress.mjs wordpress-source

      - name: Check for changes
        id: diff
        run: |
          git add content/wordpress/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --cached --stat
          fi

      - name: Commit and push synced content
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "chore(blog): sync $COUNT posts from wordpress-blog [skip ci]"
          git push

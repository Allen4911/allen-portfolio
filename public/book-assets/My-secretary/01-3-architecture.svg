<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 320" width="1040" height="320" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1040" height="320" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1040" height="3" fill="#22d3ee" opacity="0.85"/>
  <text x="520" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#f0f6fc">AI 비서의 전체 구조</text>

  <!-- 4 layers -->
  <g>
    <rect x="40" y="90" width="200" height="140" rx="14" fill="#161b22" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="140" y="135" text-anchor="middle" font-size="34">📱</text>
    <text x="140" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#f0f6fc">핸드폰</text>
    <text x="140" y="196" text-anchor="middle" font-size="13" fill="#8b949e">텔레그램 앱 (인터페이스)</text>

    <rect x="290" y="90" width="200" height="140" rx="14" fill="#161b22" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="390" y="135" text-anchor="middle" font-size="34">🤖</text>
    <text x="390" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#f0f6fc">텔레그램 봇</text>
    <text x="390" y="196" text-anchor="middle" font-size="13" fill="#8b949e">비서의 몸통 (채널)</text>

    <rect x="540" y="90" width="200" height="140" rx="14" fill="#161b22" stroke="#10b981" stroke-width="1.5"/>
    <text x="640" y="135" text-anchor="middle" font-size="34">🧠</text>
    <text x="640" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#f0f6fc">OpenClaw + ChatGPT</text>
    <text x="640" y="196" text-anchor="middle" font-size="13" fill="#8b949e">비서의 두뇌</text>

    <rect x="790" y="90" width="210" height="140" rx="14" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="895" y="135" text-anchor="middle" font-size="34">🌐</text>
    <text x="895" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#f0f6fc">외부 서비스</text>
    <text x="895" y="196" text-anchor="middle" font-size="13" fill="#8b949e">뉴스·주식 API (재료)</text>
  </g>

  <!-- connectors with labels -->
  <g font-size="12" fill="#6e7681" text-anchor="middle">
    <line x1="240" y1="160" x2="290" y2="160" stroke="#30363d" stroke-width="2"/>
    <polygon points="284,154 294,160 284,166" fill="#22d3ee"/><polygon points="246,154 236,160 246,166" fill="#22d3ee"/>
    <text x="265" y="80" fill="#8b949e">메시지</text>

    <line x1="490" y1="160" x2="540" y2="160" stroke="#30363d" stroke-width="2"/>
    <polygon points="534,154 544,160 534,166" fill="#22d3ee"/><polygon points="496,154 486,160 496,166" fill="#22d3ee"/>
    <text x="515" y="80" fill="#8b949e">명령·응답</text>

    <line x1="740" y1="160" x2="790" y2="160" stroke="#30363d" stroke-width="2"/>
    <polygon points="784,154 794,160 784,166" fill="#f59e0b"/><polygon points="746,154 736,160 746,166" fill="#f59e0b"/>
    <text x="765" y="80" fill="#8b949e">데이터 요청</text>
  </g>

  <text x="520" y="275" text-anchor="middle" font-size="13" fill="#6e7681">내 손의 텔레그램 → 봇 → ChatGPT 두뇌 → 외부 데이터, 한 방향으로 흐르고 다시 돌아옵니다</text>
</svg>

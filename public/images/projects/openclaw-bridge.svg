<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" width="620" height="340">
  <!-- Background -->
  <rect width="620" height="340" fill="#1c1c1e"/>

  <!-- Top bar -->
  <rect width="620" height="44" fill="#111113"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="22" r="6" fill="#28ca41"/>
  <text x="310" y="27" text-anchor="middle" fill="#666" font-size="12" font-family="system-ui, sans-serif">OpenClaw Bridge — Telegram → Claude CLI</text>

  <!-- Telegram icon box -->
  <rect x="30" y="64" width="130" height="90" rx="10" fill="#0088cc" opacity="0.15" stroke="#0088cc" stroke-width="1"/>
  <text x="95" y="104" text-anchor="middle" fill="#0088cc" font-size="28" font-family="system-ui">✈</text>
  <text x="95" y="128" text-anchor="middle" fill="#0088cc" font-size="11" font-family="system-ui, sans-serif" font-weight="600">Telegram</text>
  <text x="95" y="142" text-anchor="middle" fill="#666" font-size="9" font-family="system-ui, sans-serif">@cc @멤버 메시지</text>

  <!-- Arrow 1 -->
  <line x1="162" y1="109" x2="215" y2="109" stroke="#0071e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="215,105 224,109 215,113" fill="#0071e3"/>

  <!-- Bridge box -->
  <rect x="225" y="64" width="170" height="90" rx="10" fill="#272729" stroke="#444" stroke-width="1"/>
  <text x="310" y="97" text-anchor="middle" fill="#fff" font-size="12" font-family="system-ui, sans-serif" font-weight="700">OpenClaw Bridge</text>
  <text x="310" y="113" text-anchor="middle" fill="#888" font-size="9" font-family="system-ui, sans-serif">메시지 파싱 · 라우팅</text>
  <text x="310" y="128" text-anchor="middle" fill="#0071e3" font-size="9" font-family="system-ui, sans-serif">@cc @민준 → Pane 1</text>
  <text x="310" y="143" text-anchor="middle" fill="#0071e3" font-size="9" font-family="system-ui, sans-serif">@cc @all → 전체 브로드캐스트</text>

  <!-- Arrow 2 -->
  <line x1="397" y1="109" x2="448" y2="109" stroke="#0071e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="448,105 457,109 448,113" fill="#0071e3"/>

  <!-- TMUX panes -->
  <rect x="458" y="64" width="130" height="174" rx="10" fill="#0d0d0d" stroke="#444" stroke-width="1"/>
  <text x="523" y="84" text-anchor="middle" fill="#888" font-size="9" font-family="monospace">team1 session</text>
  <rect x="466" y="90" width="114" height="26" rx="4" fill="#1a1a1c" stroke="#333" stroke-width="1"/>
  <text x="523" y="107" text-anchor="middle" fill="#0071e3" font-size="9" font-family="monospace">Pane 0: 쭌 (팀장)</text>
  <rect x="466" y="120" width="114" height="26" rx="4" fill="#1a1a1c" stroke="#333" stroke-width="1"/>
  <text x="523" y="137" text-anchor="middle" fill="#ccc" font-size="9" font-family="monospace">Pane 1: 민준 (PM)</text>
  <rect x="466" y="150" width="114" height="26" rx="4" fill="#1a1a1c" stroke="#333" stroke-width="1"/>
  <text x="523" y="167" text-anchor="middle" fill="#ccc" font-size="9" font-family="monospace">Pane 2: 지훈</text>
  <rect x="466" y="180" width="114" height="26" rx="4" fill="#1a1a1c" stroke="#333" stroke-width="1"/>
  <text x="523" y="197" text-anchor="middle" fill="#ccc" font-size="9" font-family="monospace">Pane 3: 수아</text>
  <rect x="466" y="210" width="114" height="26" rx="4" fill="#1a1a1c" stroke="#333" stroke-width="1"/>
  <text x="523" y="227" text-anchor="middle" fill="#ccc" font-size="9" font-family="monospace">Pane 4~5: ...</text>

  <!-- Stats row -->
  <rect x="30" y="190" width="130" height="48" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="95" y="210" text-anchor="middle" fill="#28ca41" font-size="16" font-family="system-ui, sans-serif" font-weight="700">5x</text>
  <text x="95" y="228" text-anchor="middle" fill="#888" font-size="8" font-family="system-ui, sans-serif">팀 조율 속도</text>

  <rect x="170" y="190" width="130" height="48" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="235" y="210" text-anchor="middle" fill="#0071e3" font-size="16" font-family="system-ui, sans-serif" font-weight="700">0</text>
  <text x="235" y="228" text-anchor="middle" fill="#888" font-size="8" font-family="system-ui, sans-serif">컨텍스트 전환 비용</text>

  <rect x="310" y="190" width="130" height="48" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="375" y="210" text-anchor="middle" fill="#ffbd2e" font-size="14" font-family="system-ui, sans-serif" font-weight="700">Real-time</text>
  <text x="375" y="228" text-anchor="middle" fill="#888" font-size="8" font-family="system-ui, sans-serif">비동기 AI 팀워크</text>

  <!-- Code snippet -->
  <rect x="30" y="256" width="420" height="60" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="50" y="274" fill="#888" font-size="9" font-family="monospace">$ openclaw message send --channel telegram --target 56518471 -m '작업 완료'</text>
  <text x="50" y="290" fill="#28ca41" font-size="9" font-family="monospace">✓ Message sent via Telegram bridge</text>
  <text x="50" y="306" fill="#666" font-size="9" font-family="monospace">→ Routed to Pane 0 (쭌)</text>
</svg>

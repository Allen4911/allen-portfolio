  <text x="310" y="27" text-anchor="middle" fill="#888" font-size="12" font-family="system-ui, -apple-system, sans-serif">나만의 AI 비서 만들기 — WikiDocs</text>

  <!-- Book cover area -->
  <rect x="40" y="64" width="180" height="240" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <rect x="44" y="68" width="172" height="232" rx="6" fill="#0d0d1a"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" width="620" height="340">
  <!-- Background -->
  <rect width="620" height="340" fill="#1a1a2e"/>

  <!-- Top bar -->
  <rect width="620" height="44" fill="#12122a"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="22" r="6" fill="#28ca41"/>
  <text x="310" y="27" text-anchor="middle" fill="#666" font-size="12" font-family="system-ui, sans-serif">Claude Code 팀 에이전트 운용 가이드 — 집필 중</text>

  <!-- Main diagram: Triple Crown -->
  <text x="310" y="82" text-anchor="middle" fill="#a0a0c0" font-size="14" font-family="system-ui, sans-serif" font-weight="600">Triple Crown Strategy</text>

  <!-- Three circles -->
  <circle cx="200" cy="180" r="60" fill="none" stroke="#0071e3" stroke-width="2" opacity="0.8"/>
  <text x="200" y="174" text-anchor="middle" fill="#0071e3" font-size="12" font-family="system-ui, sans-serif" font-weight="700">gstack</text>
  <text x="200" y="190" text-anchor="middle" fill="#7aa0cc" font-size="9" font-family="system-ui, sans-serif">Browser + Tools</text>

  <circle cx="310" cy="180" r="60" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.8"/>
  <text x="310" y="174" text-anchor="middle" fill="#9d74ec" font-size="12" font-family="system-ui, sans-serif" font-weight="700">GSD</text>
  <text x="310" y="190" text-anchor="middle" fill="#9d74ec" font-size="9" font-family="system-ui, sans-serif">Plan → Execute</text>

  <circle cx="420" cy="180" r="60" fill="none" stroke="#28ca41" stroke-width="2" opacity="0.8"/>
  <text x="420" y="174" text-anchor="middle" fill="#28ca41" font-size="12" font-family="system-ui, sans-serif" font-weight="700">Superpowers</text>
  <text x="420" y="190" text-anchor="middle" fill="#6bbd80" font-size="9" font-family="system-ui, sans-serif">Skills + Workflows</text>

  <!-- Center intersection label -->
  <text x="310" y="183" text-anchor="middle" fill="#fff" font-size="8" font-family="system-ui, sans-serif" font-weight="700">AI Team</text>

  <!-- Agents row -->
  <rect x="30" y="264" width="80" height="52" rx="6" fill="#0d0d2e" stroke="#333" stroke-width="1"/>
  <text x="70" y="283" text-anchor="middle" fill="#888" font-size="8" font-family="system-ui, sans-serif">Pane 0</text>
  <text x="70" y="298" text-anchor="middle" fill="#fff" font-size="11" font-family="system-ui, sans-serif" font-weight="600">쭌</text>
  <text x="70" y="310" text-anchor="middle" fill="#0071e3" font-size="7" font-family="system-ui, sans-serif">팀장</text>

  <rect x="120" y="264" width="80" height="52" rx="6" fill="#0d0d2e" stroke="#333" stroke-width="1"/>
  <text x="160" y="283" text-anchor="middle" fill="#888" font-size="8" font-family="system-ui, sans-serif">Pane 1</text>
  <text x="160" y="298" text-anchor="middle" fill="#fff" font-size="11" font-family="system-ui, sans-serif" font-weight="600">민준</text>
  <text x="160" y="310" text-anchor="middle" fill="#ffbd2e" font-size="7" font-family="system-ui, sans-serif">PM/아키텍트</text>

  <rect x="210" y="264" width="80" height="52" rx="6" fill="#0d0d2e" stroke="#333" stroke-width="1"/>
  <text x="250" y="283" text-anchor="middle" fill="#888" font-size="8" font-family="system-ui, sans-serif">Pane 2~5</text>
  <text x="250" y="298" text-anchor="middle" fill="#fff" font-size="11" font-family="system-ui, sans-serif" font-weight="600">팀원들</text>
  <text x="250" y="310" text-anchor="middle" fill="#28ca41" font-size="7" font-family="system-ui, sans-serif">역할 분리</text>

  <!-- Writing status badge -->
  <rect x="420" y="270" width="160" height="40" rx="8" fill="#12122a" stroke="#7c3aed" stroke-width="1"/>
  <text x="500" y="287" text-anchor="middle" fill="#9d74ec" font-size="10" font-family="system-ui, sans-serif" font-weight="600">집필 중</text>
  <text x="500" y="302" text-anchor="middle" fill="#666" font-size="8" font-family="system-ui, sans-serif">WikiDocs 출판 예정</text>
</svg>
